name: release

# Publish to PyPI on a version tag via Trusted Publishing (OIDC) — no API token stored anywhere.
# One-time setup on PyPI: configure this project's Trusted Publisher as
#   owner: shomei-proof   repo: shomei-memory-verify   workflow: release.yml   environment: pypi
# The publish action also emits PEP 740 provenance attestations by default.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write          # OIDC token for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
